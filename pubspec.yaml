name: status_saver
description: A modern WhatsApp Status Saver for Android 14+
version: 1.0.0+1

# بما أنك لن ترفعه للمتجر
publish_to: 'none'

environment:
  # تم تحديثه ليتوافق مع إصدار 3.41.6 الذي اخترته
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # النسخة الأحدث لضمان عمل Permission.manageExternalStorage بدقة
  permission_handler: ^11.3.1

  # لمشاركة الحالات بسهولة
  share_plus: ^7.2.2

  # مكتبة اختيارية تساعد في التعامل مع مسارات الملفات بشكل أسهل
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # لتحسين جودة الكود وتجنب الأخطاء الشائعة
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # إذا كان لديك أيقونات أو صور، أضفها هنا تحت قسم assets
