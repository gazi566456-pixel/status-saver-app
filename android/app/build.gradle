plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    // 1. يجب أن يتطابق مع الـ package في المانيفست
    namespace "com.example.statussaver"
    
    // 2. يفضل تحديد الإصدار يدوياً لضمان دعم أندرويد 14 و 15
    compileSdkVersion 34 
    ndkVersion flutter.ndkVersion

    compileOptions {
        // إصدارات فلاتر الحديثة تفضل Java 17
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // 3. تأكد من تغيير هذا المعرف ليكون فريداً
        applicationId "com.example.statussaver"
        
        // 4. أندرويد 14 يتطلب minSdkVersion لا تقل عن 21 لإذن إدارة الملفات
        minSdkVersion 21
        targetSdkVersion 34 
        
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // بما أنك لن ترفعه للمتجر، سنبقي على مفتاح الـ debug للتجربة
            signingConfig signingConfigs.debug
            
            // تحسينات إضافية لتقليل حجم التطبيق
            shrinkResources false
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // مكتبات إضافية إذا كنت ستحتاج لمعالجة البيانات
    implementation 'com.google.code.gson:gson:2.10.1'
}
